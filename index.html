<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>56个民族 · 手势画卷</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <canvas id="mainCanvas"></canvas>

  <div id="cameraPanel">
    <video id="webcam" playsinline></video>
    <canvas id="gestureCanvas"></canvas>
    <div id="gestureIcon">✋</div>
  </div>

  <div id="topBar">
    <span id="groupName">—</span>
    <span id="newBadge" class="hidden">✦ 新解锁</span>
    <span id="groupSub"></span>
  </div>

  <div id="leftCtrl" class="sideControl" title="上一个民族">&#9664;</div>
  <div id="rightCtrl" class="sideControl" title="下一个民族">&#9654;</div>

  <div id="bottomBar">
    <button class="ctrl-btn" data-action="open"><span class="ctrl-icon">&#10024;</span> 绽放</button>
    <button class="ctrl-btn" data-action="next"><span class="ctrl-icon">&#9654;&#65039;</span> 下一个</button>
    <button class="ctrl-btn" data-action="draw"><span class="ctrl-icon">&#127984;</span> 抽卡</button>
    <button class="ctrl-btn" data-action="album"><span class="ctrl-icon">&#128214;</span> 图鉴</button>
  </div>

  <div id="infoCard" class="hidden">
    <div class="info-panel">
      <button id="closeInfo">&times;</button>
      <div id="infoBody"></div>
    </div>
  </div>

  <div id="convergeOverlay" class="hidden">
    <div class="converge-text">
      <span class="converge-main">中华民族共同体</span>
      <span class="converge-sub">the sense of community<br>for the Chinese nation</span>

    </div>
  </div>

  <!-- Welcome overlay -->
  <div id="welcomeOverlay">
    <div class="welcome-content">
      <div class="welcome-icon">&#127984;</div>
      <div class="welcome-title">56个民族 · 文化图鉴</div>
      <div class="welcome-hint">点击下方「抽卡」开始探索</div>
      <button class="welcome-btn" id="welcomeDrawBtn">&#127984; 开始抽卡</button>
    </div>
  </div>

  <!-- Draw card flip overlay -->
  <div id="drawOverlay" class="hidden">
    <div class="draw-scrim"></div>
    <div class="draw-card-frame">
      <div class="draw-card-inner" id="drawCardInner">
        <div class="draw-card-back">
          <div class="draw-pattern"></div>
          <div class="draw-question">?</div>
          <div class="draw-hint">抽卡中...</div>
        </div>
        <div class="draw-card-front">
          <div class="draw-front-bar" id="drawFrontBar"></div>
          <canvas id="drawCardCanvas" width="180" height="160"></canvas>
          <div class="draw-front-name" id="drawFrontName"></div>
          <div class="draw-front-roman" id="drawFrontRoman"></div>
          <div class="draw-front-label" id="drawFrontLabel"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Album panel -->
  <div id="albumPanel" class="hidden">
    <div class="album-backdrop"></div>
    <div class="album-container">
      <button id="closeAlbum" class="album-close">&times;</button>
      <div class="album-header">
        <h2 class="album-title">56个民族 · 图鉴</h2>
        <p class="album-progress"><span id="collectedCount">0</span> / 56 已解锁</p>
      </div>
      <div id="albumGrid" class="album-grid"></div>
    </div>
  </div>

  <div id="loadingOverlay">
    <div class="loader"></div>
    <p>正在启动摄像头...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>

  <script src="js/ethnic-data.js"></script>
  <script src="js/collection.js"></script>
  <script src="js/visual.js"></script>
  <script src="js/gesture.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
